name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test mini-agent
        working-directory: labs/mini-agent
        run: |
          python -m pip install -e '.[dev]'
          python -m pytest -q
      - name: Test mini-object-store
        working-directory: labs/mini-object-store
        run: |
          python -m pip install -e '.[dev]'
          python -m pytest -q

